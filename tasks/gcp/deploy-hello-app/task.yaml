task_id: 6
name: "deploy-hello-app"
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/minimum"
  teardown: true
  variables:
    node_count: 3
    machine_type: "e2-standard-2"
# Parallel note: all runs share one GCP project, and the agent creates an
# Artifact Registry repo (a project-global resource). The prompt pins the repo
# name to the run-unique {{GKE_CLUSTER_NAME}} so concurrent/rerun matrices don't
# collide. (The repo itself is agent-created and not torn down by the cluster
# teardown above — cleaning up leaked AR repos is a tracked follow-up.)
prompt: "Generate a production-ready Kubernetes manifest for the application located at {{APP_LOCATION}} and then deploy it to cluster {{GKE_CLUSTER_NAME}} in project {{GCP_PROJECT_ID}}. When you build and publish the container image, use an Artifact Registry repository named hello-app-{{GKE_CLUSTER_NAME}} so it is unique to this run. I know the app is just a simple hello world, pretend it is a complex app that needs full productionization (a hardened security context, a NetworkPolicy, and internet exposure)."
expected_output: |
  critical requirements:
  - Convert program to HTTP server
  - Add health check to code
  - Container build
  - Publish to Artifact Registry
  - New namespace
  - Enforce Pod Security Standards with Namespace Labels
  - Create deployment
  - Deployment has serviceAccountName
  - Min replicas > 1
  - Liveness probe
  - Readiness probe
  - Resource Requests
  - Resource Limits
  - Security Context
  - Disable privilege escalation (allowPrivilegeEscalation: false)
  - Read Only Root Filesystem
  - Run As Non-root
  - Pod Disruption Budget
  - Horizontal Pod Autoscaler
  - Successfully exposed to Internet
  - Network Policy
