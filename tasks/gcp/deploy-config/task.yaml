task_id: 3
name: "deploy-config"
infrastructure:
  deployer: "tofu"
  # Provides the cluster + the hypercomputer-d1-vllm-sa KSA (Workload Identity)
  # + the hypercomputer-d1-models-* GCS bucket the manifest's gcsfuse volume
  # references. seed_mode=infra-only deliberately does NOT pre-deploy the vllm
  # workloads — applying them is this task's agent's job.
  stack: "prebuilt/hypercomputer-d1"
  teardown: true
  variables:
    seed_mode: "infra-only"
    node_count: 3
    machine_type: "e2-standard-4"
prompt: |
  Deploy the provided manifests to cluster {{GKE_CLUSTER_NAME}} in project {{GCP_PROJECT_ID}}.

  ```
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: hypercomputer-d1-vllm-server
    name: hypercomputer-d1-vllm-server
    namespace: default
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: hypercomputer-d1-vllm-server
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: 'true'
        labels:
          app: hypercomputer-d1-vllm-server
      spec:
        automountServiceAccountToken: true
        containers:
        - args:
          - python3 -m vllm.entrypoints.openai.api_server
            --model /data/model/google-gemma-3-12b-it --served-model-name google-gemma-3-12b-it
            --host 0.0.0.0 --port 8000 --trust-remote-code
            --quantization fp8
          command:
          - /bin/bash
          - -c
          image: vllm/vllm-openai:latest
          name: vllm
          ports:
          - containerPort: 8000
            protocol: TCP
          readinessProbe:
            failureThreshold: 30
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              nvidia.com/gpu: '1'
            requests:
              cpu: '2'
          volumeMounts:
          - mountPath: /data/model
            mountPropagation: None
            name: model-volume
            readOnly: true
        serviceAccount: hypercomputer-d1-vllm-sa
        serviceAccountName: hypercomputer-d1-vllm-sa
        shareProcessNamespace: false
        terminationGracePeriodSeconds: 30
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        volumes:
        - csi:
            driver: gcsfuse.csi.storage.gke.io
            fsType: ''
            readOnly: false
            volumeAttributes:
              bucketName: hypercomputer-d1-models-{{GCP_PROJECT_ID}}
              mountOptions: implicit-dirs
          name: model-volume

  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: hypercomputer-d1-vllm-service
    namespace: default
  spec:
    ports:
    - port: 8000
      protocol: TCP
      targetPort: 8000
    selector:
      app: hypercomputer-d1-vllm-server
    type: ClusterIP

  ---
  apiVersion: autoscaling/v2
  kind: HorizontalPodAutoscaler
  metadata:
    name: hypercomputer-d1-vllm-hpa
    namespace: default
  spec:
    maxReplicas: 10
    metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 60
          type: Utilization
      type: Resource
    minReplicas: 1
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: hypercomputer-d1-vllm-server
  ```
expected_output: |
  critical requirements:

  - Execute the deployment of the provided manifests to the '{{GKE_CLUSTER_NAME}}' in project '{{GCP_PROJECT_ID}}'.
  - Confirm that the 'hypercomputer-d1-vllm-server' deployment was successfully applied to the cluster.

  Expected Manifest Generated: N/A, not a manifest generation request.