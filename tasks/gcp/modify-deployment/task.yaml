task_id: 4
name: "modify-deployment"
# Manifest-transformation task ("Modify this given manifest"): the agent edits
# the in-context YAML; no cluster access is needed. deployer: noop skips
# provisioning; generation_only is auto-derived from deployer==noop.
infrastructure:
  deployer: "noop"
prompt: |
  Modify this given Kubernetes manifest for the hypercomputer-d1-frontend app in {{GCP_PROJECT_ID}} project from using the Gemini API to a locally hosted model ```
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: hypercomputer-d1-frontend
    name: hypercomputer-d1-frontend
    namespace: default
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: hypercomputer-d1-frontend
    template:
      metadata:
        labels:
          app: hypercomputer-d1-frontend
      spec:
        automountServiceAccountToken: true
        containers:
        - env:
          - name: APP_VERSION
            value: v1.10
          - name: VLLM_API_URL
            value: http://hypercomputer-d1-vllm-service:8000/v1/chat/completions
          - name: MODEL_NAME
            value: google-gemma-3-12b-it
          - name: USE_GEMINI_API
            value: 'true'
          image: gcr.io/gke-e2e-images/hypercomputer:v1.10
          name: frontend
          ports:
          - containerPort: 8080
            protocol: TCP
        serviceAccount: hypercomputer-d1-vllm-sa
        serviceAccountName: hypercomputer-d1-vllm-sa
  ```
expected_output: |
  critical requirements:

  - Switch the 'hypercomputer-d1-frontend' from Gemini API to the local vLLM model hosting.
  - Set the environment variable 'USE_GEMINI_API' to 'false'.
  - Configure 'VLLM_API_URL' to point to 'http://hypercomputer-d1-vllm-service:8000/v1/chat/completions'.
  - Set 'MODEL_NAME' to 'google-gemma-3-12b-it'.
  - Verify the removal or disabling of Gemini API endpoints and keys in the deployment configuration.

  Expected Manifest Generated: apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: hypercomputer-d1-frontend
    name: hypercomputer-d1-frontend
    namespace: default
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: hypercomputer-d1-frontend
    template:
      metadata:
        labels:
          app: hypercomputer-d1-frontend
      spec:
        automountServiceAccountToken: true
        containers:
        - env:
          - name: APP_VERSION
            value: v1.10
          - name: VLLM_API_URL
            value: http://hypercomputer-d1-vllm-service:8000/v1/chat/completions
          - name: MODEL_NAME
            value: google-gemma-3-12b-it
          - name: USE_GEMINI_API
            value: 'false'
          image: gcr.io/gke-e2e-images/hypercomputer:v1.10
          name: frontend
          ports:
          - containerPort: 8080
            protocol: TCP
        serviceAccount: hypercomputer-d1-vllm-sa
        serviceAccountName: hypercomputer-d1-vllm-sa