task_id: 8
name: "computeclass-active-migration"
# Manifest-generation task: judged on the YAML produced by generate_manifest,
# never applied to a cluster. deployer: noop skips provisioning so it does not
# fall back to the default prebuilt/kind stack and is trivially parallel-safe.
infrastructure:
  deployer: "noop"
prompt: "Generate the Kubernetes manifest for the performance-tier ComputeClass with Active Migration enabled, so that if a workload is running on a fallback N2 instance, GKE automatically moves it to a C3 instance as soon as one becomes available. Output the manifest only; do not apply it to a cluster."
expected_output: |
  critical requirements:

  - Expected Tool Call: generate_manifest
  - Update/Modify the performance-tier ComputeClass resource.
  - Set the spec.activeMigration.optimizeRulePriority field to true.

  Expected Manifest Generated:
  apiVersion: cloud.google.com/v1
  kind: ComputeClass
  metadata:
    name: performance-tier
  spec:
    activeMigration:
      optimizeRulePriority: true
