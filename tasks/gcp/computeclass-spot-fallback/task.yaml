task_id: 7
name: "computeclass-spot-fallback"
# Manifest-generation task: judged on the YAML produced by generate_manifest,
# never applied to a cluster. deployer: noop skips provisioning so it does not
# fall back to the default prebuilt/kind stack and is trivially parallel-safe.
infrastructure:
  deployer: "noop"
prompt: "Generate the Kubernetes manifest for a ComputeClass named cost-optimized-high-cpu that prioritizes Spot VMs using the C3 machine family, but falls back to On-Demand N2 instances if Spot capacity is unavailable. Output the manifest only; do not apply it to a cluster."
expected_output: |
  critical requirements:

  - Expected Tool Call: generate_manifest
  - Create a GKE ComputeClass resource.
  - Use cost-optimized-high-cpu as the resource name.
  - Define a priorities hierarchy list with at least two rules.
  - Rule 1: Spot C3 VMs (spot: true, machineFamily: c3).
  - Rule 2: On-Demand N2 VMs (spot: false, machineFamily: n2).

  Expected Manifest Generated:
  apiVersion: cloud.google.com/v1
  kind: ComputeClass
  metadata:
    name: cost-optimized-high-cpu
  spec:
    priorities:
    - spot: true
      machineFamily: c3
    - spot: false
      machineFamily: n2
