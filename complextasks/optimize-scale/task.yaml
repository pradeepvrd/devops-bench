task_id: 1
name: "optimize-scale"
prompt: |
  Analyze the deployment "{{TARGET_DEPLOYMENT_NAME}}" in the namespace "{{NAMESPACE}}". Identify current resource bottlenecks and configuration gaps in the deployment.\nYour task is to optimize the deployment to be highly available and ensure it is able to handle any traffic surges.
expected_output: |
  critical requirements:
  - Agent adds resource requests and limits to the deployment.
  - Agent creates an HPA with minReplicas > 1 and appropriate target CPU.
  - Agent detects and takes appropriate actions to handle the chaos event (load spike).
chaos_spec: |
  [
    {
      "name": "Planned Load Spike",
      "trigger": { "type": "time", "delay_seconds": 5 },
      "action": { 
        "type": "generate_load", 
        "target": { "service_url": "http://{{TARGET_DEPLOYMENT_NAME}}.{{NAMESPACE}}.svc.cluster.local", "qps": 1000 } 
      }
    }
  ]
